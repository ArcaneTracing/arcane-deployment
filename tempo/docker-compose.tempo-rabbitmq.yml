services:
  postgres:
    image: postgres:16-alpine
    container_name: arcane-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-arcanedb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arcane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d arcanedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: arcane-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - arcane
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  init:
    image: busybox:latest
    user: root
    entrypoint: ["chown", "-R", "10001:10001", "/var/tempo"]
    volumes:
      - tempo-data:/var/tempo
    networks:
      - arcane

  tempo:
    image: grafana/tempo:latest
    container_name: arcane-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ../config/tempo-config.yaml:/etc/tempo/tempo.yaml
      - tempo-data:/var/tempo
    networks:
      - arcane
    depends_on:
      - init

  otel-collector:
    image: otel/opentelemetry-collector:0.86.0
    container_name: arcane-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../config/otel-tempo.yml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - arcane
    depends_on:
      - tempo

  frontend:
    image: arcanetracing/arcane-ui:latest
    container_name: arcane-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8085
    depends_on:
      - backend
    networks:
      - arcane

  backend:
    image: arcanetracing/arcane:latest
    container_name: arcane-backend
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/arcanedb}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      WORKER_API: http://worker:8000/api/v1/run
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8085}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars!!}
      API_KEY_SALT: ${API_KEY_SALT:-dev-api-key-salt}
      MESSAGE_BROKER: rabbitmq
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      ARCANE_ENTERPRISE_LICENSE: ${ARCANE_ENTERPRISE_LICENSE:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - arcane

  worker:
    image: arcanetracing/arcane-worker:latest
    container_name: arcane-worker
    environment:
      MESSAGE_BROKER: rabbitmq
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      API_BASE_URL: http://backend:8085
      EVALUATION_JOB_QUEUE: evaluation-jobs
      EVALUATION_RESULT_QUEUE: evaluation-results
      EXPERIMENT_JOB_QUEUE: experiment-jobs
      EXPERIMENT_RESULT_QUEUE: experiment-results
    depends_on:
      - backend
      - rabbitmq
    networks:
      - arcane

volumes:
  postgres-data:
  tempo-data:

networks:
  arcane:
    driver: bridge
